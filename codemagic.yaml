workflows:
  ios-build:
    name: iOS IPA Build
    instance_type: mac_mini_m1
    max_build_duration: 45
    environment:
      xcode: 16.4
    scripts:
      - name: Build iOS app
        script: |
          xcodebuild build \
            -scheme "DangDangShareIOS" \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/MyApp.xcarchive \
            archive
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/MyApp.xcarchive \
            -exportPath $CM_BUILD_DIR \
            -exportOptionsPlist ExportOptions.plist
    artifacts:
      - build/*.ipa
    publishing:
      artifacts:
        name: MyApp-IPA