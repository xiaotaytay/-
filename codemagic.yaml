workflows:
  dangdang-share-ios:
    name: DangDangShare iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.dangdang.share
      vars:
        BUNDLE_ID: "com.dangdang.share"
        XCODE_PROJECT: "DangDangShare.xcodeproj"
        XCODE_SCHEME: "DangDangShare"
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          #!/bin/sh
          set -e
          
          echo "========================================="
          echo "  Building DangDangShare iOS"
          echo "========================================="
          
          cd $CM_BUILD_DIR
          
          echo "[INFO] Project directory contents:"
          ls -la
          
          if [ ! -f "$XCODE_PROJECT" ]; then
            echo "[ERROR] Xcode project not found: $XCODE_PROJECT"
            exit 1
          fi
          
          echo "[INFO] Available schemes:"
          xcodebuild -list -project "$XCODE_PROJECT" || true
          
          echo "[INFO] Starting build..."
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --options "-destination generic/platform=iOS" \
            --ipa-include-bitcode=false \
            --ipa-strip-frameworks=true \
            --ipa-compress=true
          
          echo "[BUILD COMPLETE]"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true
