workflows:
  dangdang-share-ios:
    name: DangDangShare iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        BUNDLE_ID: "com.dangdang.share"
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up code signing
        script: |
          #!/bin/sh
          set -e
          cd $CM_BUILD_DIR
          PROJECT_FILE=$(find . -name "*.xcodeproj" -type d | head -1)
          if [ -z "$PROJECT_FILE" ]; then
            echo "[ERROR] No Xcode project found"
            exit 1
          fi
          echo "[INFO] Using project: $PROJECT_FILE"
          xcode-project use-profiles --project "$PROJECT_FILE"
      - name: Build ipa
        script: |
          #!/bin/sh
          set -e
          cd $CM_BUILD_DIR
          
          PROJECT_FILE=$(find . -name "*.xcodeproj" -type d | head -1)
          SCHEME_NAME=$(basename "$PROJECT_FILE" .xcodeproj)
          
          echo "[INFO] Building with project: $PROJECT_FILE, scheme: $SCHEME_NAME"
          
          mkdir -p build/ios/ipa
          
          xcodebuild -project "$PROJECT_FILE" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$CM_BUILD_DIR/build/ios/archive/DangDangShare.xcarchive" \
            archive
          
          echo "[INFO] Creating ExportOptions.plist"
          echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>method</key><string>development</string><key>signingStyle</key><string>automatic</string><key>compileBitcode</key><false/></dict></plist>' > ExportOptions.plist
          
          echo "[INFO] Exporting IPA..."
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/ios/archive/DangDangShare.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa" \
            -exportOptionsPlist "$CM_BUILD_DIR/ExportOptions.plist"
          
          echo "[BUILD COMPLETE]"
          ls -la build/ios/ipa/
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true
